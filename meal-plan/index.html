<!doctype html>
<html lang='zh-CN'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1, viewport-fit=cover'>
  <meta name='theme-color' content='#fafafa'>
  <title>地中海饮食一周食谱｜孕妇 + 爸爸</title>
  <link rel='stylesheet' href='./styles.css'>
</head>
<body>
  <div class='mobile-bar' id='mobileTabs'></div>

  <div class='app-shell'>
    <aside class='sidebar'>
      <div class='brand'>
        <div style='display:flex;gap:10px;align-items:center'>
          <div class='brand-mark'>🥗</div>
          <div>
            <div class='brand-title'>地中海一周食谱</div>
            <div class='brand-sub'>孕妇 + 爸爸 · 2 人份</div>
          </div>
        </div>
        <span class='pill'>14 顿</span>
      </div>

      <div class='note' style='margin-bottom:14px'>
        重点：全熟、少盐、低汞鱼、食材复用。肉、鱼、虾、蛋都要熟透；绿叶菜只买一种即可。
      </div>

      <input id='mobileSearch' class='search' style='width:100%;margin:0 0 14px' placeholder='搜索菜名 / 食材，例如 番茄、鸡胸、鱼'>

      <div class='section-title'>周末大采购</div>
      <div id='weekendShopping'></div>

      <div class='section-title'>周三晚 / 周四早补货</div>
      <div id='midweekShopping'></div>

      <div style='display:flex;gap:8px;flex-wrap:wrap;margin-top:14px'>
        <button class='btn' id='copyBtn' type='button'>复制买菜清单</button>
        <button class='btn' id='printBtn' type='button'>打印</button>
      </div>
    </aside>

    <main class='main'>
      <section class='hero'>
        <div class='hero-card'>
          <div class='kicker'>Geist-style Meal Planner · Mediterranean</div>
          <h1>偏地中海饮食的一周午餐晚餐</h1>
          <p>
            这是完整的可交互版本：菜单、买菜清单和每道菜的详细用量/步骤都集中在一个页面。点击任意菜谱卡片，桌面端右侧显示详情；手机端从底部弹出详情抽屉。
          </p>
          <div class='hero-actions'>
            <span class='pill'>橄榄油</span>
            <span class='pill'>番茄</span>
            <span class='pill'>鱼虾</span>
            <span class='pill'>鸡肉</span>
            <span class='pill'>豆类</span>
            <span class='pill'>全谷物</span>
          </div>
        </div>
      </section>

      <section class='content'>
        <div class='toolbar'>
          <div class='tabs' id='desktopTabs'></div>
          <input id='search' class='search' placeholder='搜索菜名 / 食材，例如 番茄、鸡胸、鱼'>
        </div>

        <div class='section-title'>一周菜单 · 点击查看做法</div>
        <div id='recipeList'></div>
      </section>
    </main>

    <aside class='panel'>
      <div id='detail' class='panel-empty'>
        <div>
          <div style='font-size:28px'>🍽️</div>
          <p>请选择一道菜查看详细步骤</p>
        </div>
      </div>
    </aside>
  </div>

  <div id='scrim' class='scrim'></div>
  <aside id='drawer' class='drawer'>
    <button id='closeDrawer' class='drawer-close' type='button'>×</button>
    <div id='drawerBody'></div>
  </aside>

  <script src='./app.js'></script>
  <script src='./shell-shrimp.js'></script>
</body>
</html>
